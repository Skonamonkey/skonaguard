services:
  skonaguard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: skonaguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun
    volumes:
      - ./data/wireguard:/etc/wireguard
      - ./data/database:/app/database
    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "${UI_PORT:-8080}:8080"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - WG_PORT=${WG_PORT:-51820}
      - WG_SUBNET=${WG_SUBNET:-172.16.0.0/16}
      - WG_SUBNET_HUB=${WG_SUBNET_HUB:-172.16.0.1}
      - WG_HOST_IP=${WG_HOST_IP:-172.16.0.2}
      - SERVER_PUBLIC_IP=${SERVER_PUBLIC_IP:-}
      - UI_BIND=${UI_BIND:-0.0.0.0}
    networks:
      - default
      - proxy-net

networks:
  proxy-net:
    external: true
